<aside class="sidebar">
    <div class="sidebar-brand">
        <h2>TrainWise AI</h2>
        <p class="sidebar-tagline">AI Fitness &amp; Athletic Coach</p>
        <p class="sidebar-version">Together AI Edition</p>
    </div>
    <nav class="sidebar-nav" aria-label="Primary Navigation">
        <a href="{{ url_for('web.onboarding') }}" class="nav-link {% if request.endpoint == 'web.onboarding' %}active{% endif %}" {% if request.endpoint == 'web.onboarding' %}aria-current="page"{% endif %}>Profile Setup</a>
        <a href="{% if session.get('results') %}{{ url_for('web.results') }}{% elif session.get('profile') %}{{ url_for('web.plan') }}{% else %}{{ url_for('web.onboarding') }}{% endif %}" class="nav-link {% if request.endpoint in ['web.plan', 'web.results'] %}active{% endif %}" {% if request.endpoint in ['web.plan', 'web.results'] %}aria-current="page"{% endif %}>Current Plan</a>
        <a href="{{ url_for('web.daily_checkin') }}" class="nav-link {% if request.endpoint in ['web.daily_checkin', 'web.daily_result'] %}active{% endif %}" {% if request.endpoint in ['web.daily_checkin', 'web.daily_result'] %}aria-current="page"{% endif %}>Daily Check-in</a>
        <a href="{{ url_for('web.nutrition') }}" class="nav-link {% if request.endpoint == 'web.nutrition' %}active{% endif %}" {% if request.endpoint == 'web.nutrition' %}aria-current="page"{% endif %}>Nutrition</a>
        <a href="{{ url_for('web.dashboard') }}" class="nav-link {% if request.endpoint in ['web.dashboard', 'web.saved_plan_detail'] %}active{% endif %}" {% if request.endpoint in ['web.dashboard', 'web.saved_plan_detail'] %}aria-current="page"{% endif %}>Saved Plans</a>
    </nav>
    <div class="sidebar-status" role="region" aria-label="Service Connections">
        <h5>Service Connections</h5>
        <div class="status-line">
            <span>AI Coach:</span>
            <span class="{% if api_status.ai_coach == 'Connected' %}status-ok{% elif api_status.ai_coach == 'Design Mode' %}status-info{% else %}status-warn{% endif %}" role="status">
                {{ api_status.ai_coach }}
            </span>
        </div>
        <div class="status-line">
            <span>Exercise Images:</span>
            <span class="{% if api_status.exercise_images == 'Connected' %}status-ok{% elif api_status.exercise_images == 'Design Mode' %}status-info{% else %}status-warn{% endif %}" role="status">
                {{ api_status.exercise_images }}
            </span>
        </div>
        <div class="status-line">
            <span>Cloud DB:</span>
            <span class="{% if api_status.cloud_db == 'Connected' %}status-ok{% else %}status-info{% endif %}" role="status">
                {{ api_status.cloud_db }}
            </span>
        </div>
    </div>
    <form action="{{ url_for('web.start_over') }}" method="post" class="sidebar-form">
        <button type="submit" class="btn btn-secondary btn-block btn-sm">Start Over</button>
    </form>
</aside>
